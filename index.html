<!-- 摸鱼小记模态框 (完整结构) -->
<div class="modal" id="moyu-modal" style="display:none;">
    <div class="modal-content" style="max-width:520px; overflow:hidden;">
        <div class="modal-title"><i class="fas fa-fish"></i><span>摸鱼小记</span></div>
        <div class="moyu-tabs" style="display:flex; gap:8px; margin-bottom:16px; background:var(--secondary-bg); border-radius:12px; padding:4px;">
            <button class="moyu-tab-btn active" id="moyu-tab-current" onclick="switchMoyuTab('current')" style="flex:1; padding:8px 12px; border-radius:10px; border:none; background:rgba(var(--accent-color-rgb),0.16); color:var(--accent-color); font-size:13px; cursor:pointer;"><i class="fas fa-clock"></i> 当前</button>
            <button class="moyu-tab-btn" id="moyu-tab-records" onclick="switchMoyuTab('records')" style="flex:1; padding:8px 12px; border-radius:10px; border:none; background:transparent; color:var(--text-secondary); font-size:13px; cursor:pointer;"><i class="fas fa-list"></i> 记录</button>
        </div>
        <div id="moyu-current-panel" style="max-height:45vh; overflow-y:auto;"></div>
        <div id="moyu-records-panel" style="display:none; max-height:45vh; overflow-y:auto;">
            <div id="moyu-time-filter" style="margin-bottom:12px; padding:12px; background:var(--secondary-bg); border-radius:12px;">
                <div style="font-size:12px; font-weight:600; margin-bottom:8px;"><i class="fas fa-filter"></i> 时间筛选</div>
                <div style="display:flex; gap:8px; margin-bottom:10px;">
                    <select id="moyu-filter-preset" style="flex:1; padding:8px; border:1px solid var(--border-color); border-radius:8px; background:var(--primary-bg); color:var(--text-primary); font-size:12px;">
                        <option value="all">全部记录</option><option value="today">今天</option><option value="week">最近7天</option><option value="month">最近30天</option><option value="custom">自定义范围</option>
                    </select>
                </div>
                <div id="moyu-custom-date-range" style="display:none; gap:8px;">
                    <input type="date" id="moyu-filter-start" style="flex:1; padding:8px; border-radius:8px; background:var(--primary-bg);"><span>至</span>
                    <input type="date" id="moyu-filter-end" style="flex:1; padding:8px; border-radius:8px; background:var(--primary-bg);">
                </div>
                <div id="moyu-filter-info" class="moyu-filter-info">显示全部记录</div>
            </div>
            <div id="moyu-records-list"></div>
        </div>
        <div class="modal-buttons" style="margin-top:16px;">
            <button class="modal-btn modal-btn-secondary" id="close-moyu-modal" style="flex:1;">关闭</button>
            <button class="modal-btn modal-btn-primary" id="open-moyu-editor-btn" style="flex:1;"><i class="fas fa-plus"></i> 添加摸鱼</button>

<!-- 摸鱼编辑滑层 -->
<div class="moyu-editor-slide" id="moyu-editor-slide" style="position:fixed; top:0; left:0; right:0; bottom:0; background:var(--primary-bg); z-index:10000; transform:translateX(100%); transition:transform 0.3s ease; display:flex; flex-direction:column;">
    <div style="display:flex; align-items:center; padding:16px; border-bottom:1px solid var(--border-color); gap:12px;">
        <button id="close-moyu-editor" style="background:none; border:none; color:var(--text-secondary); font-size:20px; cursor:pointer;"><i class="fas fa-arrow-left"></i></button>
        <span style="font-weight:600; font-size:15px;"><i class="fas fa-fish"></i> 编辑摸鱼记录</span>
    </div>
    <div style="flex:1; overflow-y:auto; padding:16px;">
        <div class="moyu-content-row">
            <label><i class="fas fa-map-marker-alt"></i> 工作地点</label>
            <select id="moyu-location-select" style="width:100%; padding:10px; border-radius:10px; border:1px solid var(--border-color); background:var(--primary-bg); color:var(--text-primary);"></select>
            <div class="moyu-location-add"><input type="text" id="new-location-input" placeholder="新地点名称"><button id="add-location-btn">添加</button></div>
        </div>
        <div class="moyu-content-row">
            <label><i class="fas fa-calendar"></i> 日期</label>
            <input type="date" id="moyu-date-input" style="width:100%; padding:10px; border-radius:10px; border:1px solid var(--border-color); background:var(--primary-bg);">
        </div>
        <div class="moyu-content-row">
            <label><i class="fas fa-clock"></i> 工作时长 (小时)</label>
            <input type="number" id="moyu-hours-input" min="0" max="24" step="0.5" placeholder="例如: 8" style="width:100%; padding:10px; border-radius:10px;">
        </div>
        <div class="moyu-content-row">
            <label><i class="fas fa-magic"></i> 摸鱼内容</label>
            <div class="moyu-random-wrap">
                <input type="text" id="moyu-content-input" placeholder="摸鱼内容" style="flex:1; padding:10px; border-radius:10px; border:1px solid var(--border-color); background:var(--primary-bg);">
                <button type="button" id="moyu-random-content-btn" class="moyu-random-btn"><i class="fas fa-dice"></i> 随机</button>
            </div>
            <div style="font-size:11px; color:var(--text-secondary); margin-top:5px;">✨ 点击随机从摸鱼库抽取有趣活动</div>
        </div>
    </div>
    <div style="padding:16px; border-top:1px solid var(--border-color); display:flex; gap:12px;">
        <button class="modal-btn modal-btn-secondary" id="cancel-moyu-editor" style="flex:1;">取消</button>
        <button class="modal-btn modal-btn-primary" id="save-moyu-record" style="flex:2;"><i class="fas fa-check"></i> 保存记录</button>
    </div>
    <input type="hidden" id="edit-record-id" value="">
</div>

<script>
// ===================== 摸鱼小记 完整功能 =====================
(function(){
    const STORAGE_RECORDS = 'moyu_records';
    const STORAGE_ACTIVITIES = 'moyu_activities';
    const STORAGE_LOCATIONS = 'moyu_locations';
    
    let records = [];
    let activityPool = [
        "刷小红书摸鱼", "偷偷看微博热搜", "和同事闲聊半小时", "打盹十分钟", "吃零食补充能量",
        "逛淘宝看商品", "玩手机小游戏", "写今日摸鱼总结", "看窗外出神", "假装开会实际发呆",
        "听音乐放空", "研究新菜谱", "翻阅电子书", "整理桌面", "给绿植浇水", "画简笔画"
    ];
    let locations = ["办公室", "在家办公", "咖啡馆", "图书馆", "会议室", "茶水间"];
    
    function loadData(){
        const storedRecords = localStorage.getItem(STORAGE_RECORDS);
        if(storedRecords) records = JSON.parse(storedRecords);
        else records = [];
        const storedActs = localStorage.getItem(STORAGE_ACTIVITIES);
        if(storedActs) activityPool = JSON.parse(storedActs);
        const storedLocs = localStorage.getItem(STORAGE_LOCATIONS);
        if(storedLocs) locations = JSON.parse(storedLocs);
        if(!locations.length) locations = ["办公室", "在家办公"];
    }
    function saveRecords(){ localStorage.setItem(STORAGE_RECORDS, JSON.stringify(records)); }
    function saveActivities(){ localStorage.setItem(STORAGE_ACTIVITIES, JSON.stringify(activityPool)); }
    function saveLocations(){ localStorage.setItem(STORAGE_LOCATIONS, JSON.stringify(locations)); }
    
    function getRandomActivity(){ return activityPool.length ? activityPool[Math.floor(Math.random()*activityPool.length)] : "默默摸鱼"; }
    
    function renderCurrent(){
        const container = document.getElementById('moyu-current-panel');
        if(!container) return;
        const sorted = [...records].sort((a,b)=>new Date(b.date) - new Date(a.date));
        const latest = sorted[0];
        if(!latest){
            container.innerHTML = `<div class="moyu-empty"><i class="fas fa-fish" style="font-size:32px; opacity:0.3;"></i><p>暂无摸鱼记录<br>点击「添加摸鱼」记录今日摸鱼时光~</p></div>`;
            return;
        }
        const dateStr = latest.date;
        const hours = latest.hours || 0;
        container.innerHTML = `
            <div class="moyu-record-item" style="border-left:3px solid var(--accent-color);">
                <div class="moyu-record-header"><span class="moyu-record-date">📅 ${dateStr}</span><span class="moyu-record-location">📍 ${latest.location}</span></div>
                <div class="moyu-record-content">🎣 ${latest.content}</div>
                <div class="moyu-record-meta"><span>⏱ 摸鱼时长: ${hours}小时</span><span>💼 工作时长: ${latest.workHours || hours}小时</span></div>
                <div style="font-size:11px; color:var(--accent-color); margin-top:6px;">✨ 最近一条摸鱼记录</div>
            </div>
        `;
    }
    
    function renderRecords(filterType='all', startDate=null, endDate=null){
        const listContainer = document.getElementById('moyu-records-list');
        if(!listContainer) return;
        let filtered = [...records];
        const today = new Date().toISOString().slice(0,10);
        if(filterType === 'today') filtered = filtered.filter(r => r.date === today);
        else if(filterType === 'week'){
            const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate()-7);
            filtered = filtered.filter(r => new Date(r.date) >= weekAgo);
        } else if(filterType === 'month'){
            const monthAgo = new Date(); monthAgo.setDate(monthAgo.getDate()-30);
            filtered = filtered.filter(r => new Date(r.date) >= monthAgo);
        } else if(filterType === 'custom' && startDate && endDate){
            filtered = filtered.filter(r => r.date >= startDate && r.date <= endDate);
        }
        filtered.sort((a,b)=>new Date(b.date)-new Date(a.date));
        if(filtered.length === 0){
            listContainer.innerHTML = `<div class="moyu-empty"><i class="fas fa-fish"></i><p>暂无摸鱼记录~</p></div>`;
            return;
        }
        listContainer.innerHTML = filtered.map(rec => `
            <div class="moyu-record-item" data-id="${rec.id}">
                <div class="moyu-record-header"><span class="moyu-record-date">📅 ${rec.date}</span><span class="moyu-record-location">📍 ${rec.location}</span></div>
                <div class="moyu-record-content">🎣 ${rec.content}</div>
                <div class="moyu-record-meta"><span>⏱ 摸鱼时长: ${rec.hours}小时</span><span>💼 工作时长: ${rec.workHours || rec.hours}小时</span></div>
                <div class="moyu-record-actions">
                    <button class="edit-record-btn" data-id="${rec.id}"><i class="fas fa-edit"></i> 编辑</button>
                    <button class="delete-record-btn" data-id="${rec.id}"><i class="fas fa-trash"></i> 删除</button>
                </div>
            </div>
        `).join('');
        document.querySelectorAll('.edit-record-btn').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); const id = btn.dataset.id; openEditorById(id); }));
        document.querySelectorAll('.delete-record-btn').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); const id = btn.dataset.id; if(confirm('确定删除这条摸鱼记录吗？')) deleteRecordById(id); }));
    }
    
    function deleteRecordById(id){
        records = records.filter(r => r.id != id);
        saveRecords();
        refreshAllViews();
        if(typeof showNotification === 'function') showNotification('已删除摸鱼记录', 'info');
        else alert('已删除');
    }
    
    function openEditorById(id=null){
        const slide = document.getElementById('moyu-editor-slide');
        const idField = document.getElementById('edit-record-id');
        const locSelect = document.getElementById('moyu-location-select');
        const dateInput = document.getElementById('moyu-date-input');
        const hoursInput = document.getElementById('moyu-hours-input');
        const contentInput = document.getElementById('moyu-content-input');
        if(!slide) return;
        idField.value = id || '';
        updateLocationSelect();
        if(id){
            const record = records.find(r => r.id == id);
            if(record){
                locSelect.value = record.location;
                dateInput.value = record.date;
                hoursInput.value = record.hours;
                contentInput.value = record.content;
            } else { resetFormFields(); }
        } else { resetFormFields(); }
        slide.style.transform = 'translateX(0)';
    }
    function resetFormFields(){
        document.getElementById('moyu-location-select').value = locations[0] || '';
        document.getElementById('moyu-date-input').value = new Date().toISOString().slice(0,10);
        document.getElementById('moyu-hours-input').value = '';
        document.getElementById('moyu-content-input').value = '';
        document.getElementById('edit-record-id').value = '';
    }
    function updateLocationSelect(){
        const select = document.getElementById('moyu-location-select');
        if(!select) return;
        select.innerHTML = locations.map(loc => `<option value="${loc}">${loc}</option>`).join('');
    }
    function saveCurrentRecord(){
        const idField = document.getElementById('edit-record-id');
        const location = document.getElementById('moyu-location-select').value;
        const date = document.getElementById('moyu-date-input').value;
        let hours = parseFloat(document.getElementById('moyu-hours-input').value);
        if(isNaN(hours)) hours = 0;
        let content = document.getElementById('moyu-content-input').value.trim();
        if(!content) { alert('请填写摸鱼内容'); return; }
        if(!location) { alert('请选择地点'); return; }
        if(!date) { alert('请选择日期'); return; }
        if(idField.value){
            const idx = records.findIndex(r => r.id == idField.value);
            if(idx !== -1){
                records[idx] = { ...records[idx], location, date, hours, content, workHours: hours, updatedAt: Date.now() };
                saveRecords();
            } else { alert('记录不存在'); }
        } else {
            const newId = Date.now() + '_' + Math.random();
            records.push({ id: newId, location, date, hours, content, workHours: hours, createdAt: Date.now() });
            saveRecords();
        }
        document.getElementById('moyu-editor-slide').style.transform = 'translateX(100%)';
        refreshAllViews();
        if(typeof showNotification === 'function') showNotification('摸鱼记录已保存', 'success');
    }
    function refreshAllViews(){
        renderCurrent();
        const filterPreset = document.getElementById('moyu-filter-preset')?.value || 'all';
        let start=null, end=null;
        if(filterPreset === 'custom'){
            start = document.getElementById('moyu-filter-start')?.value;
            end = document.getElementById('moyu-filter-end')?.value;
        }
        renderRecords(filterPreset, start, end);
        updateFilterInfo();
    }
    function updateFilterInfo(){
        const filter = document.getElementById('moyu-filter-preset')?.value;
        const infoDiv = document.getElementById('moyu-filter-info');
        if(!infoDiv) return;
        if(filter === 'all') infoDiv.innerText = '显示全部记录';
        else if(filter === 'today') infoDiv.innerText = '仅显示今天记录';
        else if(filter === 'week') infoDiv.innerText = '最近7天记录';
        else if(filter === 'month') infoDiv.innerText = '最近30天记录';
        else if(filter === 'custom') infoDiv.innerText = '自定义日期范围';
    }
    function addNewLocation(){
        const input = document.getElementById('new-location-input');
        const newLoc = input.value.trim();
        if(newLoc && !locations.includes(newLoc)){
            locations.push(newLoc);
            saveLocations();
            updateLocationSelect();
            input.value = '';
            alert(`已添加地点：${newLoc}`);
        } else if(newLoc && locations.includes(newLoc)) alert('地点已存在');
        else alert('请输入有效地点名称');
    }
    function randomizeContent(){
        const contentInput = document.getElementById('moyu-content-input');
        if(contentInput) contentInput.value = getRandomActivity();
    }
    function switchMoyuTab(tab){
        const currentPanel = document.getElementById('moyu-current-panel');
        const recordsPanel = document.getElementById('moyu-records-panel');
        const tabCurrent = document.getElementById('moyu-tab-current');
        const tabRecords = document.getElementById('moyu-tab-records');
        if(tab === 'current'){
            currentPanel.style.display = 'block';
            recordsPanel.style.display = 'none';
            tabCurrent.classList.add('active'); tabCurrent.style.background = 'rgba(var(--accent-color-rgb),0.16)'; tabCurrent.style.color = 'var(--accent-color)';
            tabRecords.classList.remove('active'); tabRecords.style.background = 'transparent'; tabRecords.style.color = 'var(--text-secondary)';
            renderCurrent();
        } else {
            currentPanel.style.display = 'none';
            recordsPanel.style.display = 'block';
            tabRecords.classList.add('active'); tabRecords.style.background = 'rgba(var(--accent-color-rgb),0.16)'; tabRecords.style.color = 'var(--accent-color)';
            tabCurrent.classList.remove('active'); tabCurrent.style.background = 'transparent'; tabCurrent.style.color = 'var(--text-secondary)';
            const filter = document.getElementById('moyu-filter-preset')?.value || 'all';
            let start=null,end=null;
            if(filter === 'custom'){ start = document.getElementById('moyu-filter-start')?.value; end = document.getElementById('moyu-filter-end')?.value; }
            renderRecords(filter, start, end);
        }
    }
    function bindEvents(){
        document.getElementById('close-moyu-modal')?.addEventListener('click', ()=>{
            const modal = document.getElementById('moyu-modal');
            if(modal && typeof hideModal === 'function') hideModal(modal);
            else modal.style.display = 'none';
        });
        document.getElementById('open-moyu-editor-btn')?.addEventListener('click', ()=> openEditorById(null));
        document.getElementById('close-moyu-editor')?.addEventListener('click', ()=> document.getElementById('moyu-editor-slide').style.transform = 'translateX(100%)');
        document.getElementById('cancel-moyu-editor')?.addEventListener('click', ()=> document.getElementById('moyu-editor-slide').style.transform = 'translateX(100%)');
        document.getElementById('save-moyu-record')?.addEventListener('click', saveCurrentRecord);
        document.getElementById('add-location-btn')?.addEventListener('click', addNewLocation);
        document.getElementById('moyu-random-content-btn')?.addEventListener('click', randomizeContent);
        const filterPreset = document.getElementById('moyu-filter-preset');
        if(filterPreset){
            filterPreset.addEventListener('change', (e)=>{
                const customDiv = document.getElementById('moyu-custom-date-range');
                if(e.target.value === 'custom') customDiv.style.display = 'flex';
                else customDiv.style.display = 'none';
                const filter = e.target.value;
                let start=null,end=null;
                if(filter === 'custom'){ start = document.getElementById('moyu-filter-start')?.value; end = document.getElementById('moyu-filter-end')?.value; }
                renderRecords(filter, start, end);
                updateFilterInfo();
            });
        }
        const startDate = document.getElementById('moyu-filter-start');
        const endDate = document.getElementById('moyu-filter-end');
        if(startDate && endDate){
            const applyCustom = ()=>{
                if(filterPreset?.value === 'custom'){
                    renderRecords('custom', startDate.value, endDate.value);
                    updateFilterInfo();
                }
            };
            startDate.addEventListener('change', applyCustom);
            endDate.addEventListener('change', applyCustom);
        }
        const todayBtn = document.getElementById('moyu-today-btn'); 
    }
    function initMoyu(){
        loadData();
        if(!activityPool.length) activityPool = ["刷小红书摸鱼", "偷偷看微博热搜", "和同事闲聊半小时", "打盹十分钟"];
        bindEvents();
        updateLocationSelect();
        renderCurrent();
        const modal = document.getElementById('moyu-modal');
        if(modal && !modal._observer){
            const observer = new MutationObserver(()=>{ if(modal.style.display !== 'none'){ refreshAllViews(); } });
            observer.observe(modal, { attributes: true, attributeFilter: ['style'] });
            modal._observer = observer;
        }
        document.getElementById('moyu-date-input').value = new Date().toISOString().slice(0,10);
        if(typeof window !== 'undefined') window.switchMoyuTab = switchMoyuTab;
    }
    window.moyuRefresh = refreshAllViews;
    window.openMoyuEditor = (id)=>openEditorById(id);
    if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initMoyu);
    else initMoyu();
})();
function openApp(appId){
    if(appId === 'moyu'){
        const modal = document.getElementById('moyu-modal');
        if(modal){
            if(typeof showModal === 'function') showModal(modal);
            else modal.style.display = 'flex';
            if(window.moyuRefresh) window.moyuRefresh();
            else if(window.moyuRefresh) window.moyuRefresh();
        }
    } else if(appId === 'shop') { if(window.ShopApp && window.ShopApp.showShop) window.ShopApp.showShop(); }
    else if(appId === 'chat') { const chatCont = document.querySelector('.main-chat-area'); if(chatCont) chatCont.style.display = 'flex'; document.getElementById('home-container').style.display='none';}
    else if(appId === 'pet') { const petCont = document.getElementById('pet-container'); if(petCont) petCont.style.display='block'; document.getElementById('home-container').style.display='none';}
    else if(appId === 'ta-phone') { const phoneCont = document.getElementById('ta-phone-container'); if(phoneCont) phoneCont.style.display='flex'; document.getElementById('home-container').style.display='none';}
    else if(appId === 'moments') { const momentsCont = document.getElementById('moments-container'); if(momentsCont) momentsCont.style.display='block'; document.getElementById('home-container').style.display='none';}
    else alert('功能开发中');
}
function showModal(modal){ if(modal) modal.style.display = 'flex'; }
function hideModal(modal){ if(modal) modal.style.display = 'none'; }
window.openApp = openApp; window.showModal = showModal; window.hideModal = hideModal;
window.switchMoyuTab = function(tab){ if(window.switchMoyuTab) window.switchMoyuTab(tab); };
</script>
